<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Georgia, 'Times New Roman', serif; font-style: italic; }
      .title-reg { font-family: Georgia, 'Times New Roman', serif; }
      .sans { font-family: Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#ffffff"/>
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#ececec" stroke-width="1"/>

  <!-- Eyebrow -->
  <g>
    <line x1="430" y1="170" x2="478" y2="170" stroke="#b8912a" stroke-width="1"/>
    <text x="600" y="176" text-anchor="middle" class="sans" font-size="15" letter-spacing="4" fill="#b8912a">GUIA DEFINITIVO DE DUPES</text>
    <line x1="722" y1="170" x2="770" y2="170" stroke="#b8912a" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="600" y="290" text-anchor="middle" class="title-reg" font-size="84" font-weight="300" fill="#1a1a1a">DupeScent</text>

  <!-- Subtitle -->
  <text x="600" y="350" text-anchor="middle" class="sans" font-size="20" font-weight="300" fill="#6b7280">O luxo tem um substituto perfeito — encontre o dupe ideal</text>
  <text x="600" y="380" text-anchor="middle" class="sans" font-size="20" font-weight="300" fill="#6b7280">para mais de 100 perfumes importados.</text>

  <!-- Stats -->
  <g>
    <text x="430" y="460" text-anchor="middle" class="title-reg" font-size="40" font-weight="300" fill="#b8912a">100+</text>
    <text x="430" y="486" text-anchor="middle" class="sans" font-size="12" letter-spacing="2" fill="#9ca3af">ORIGINAIS</text>
  </g>
  <circle cx="540" cy="450" r="3" fill="#d1d5db"/>
  <g>
    <text x="650" y="460" text-anchor="middle" class="title-reg" font-size="40" font-weight="300" fill="#b8912a">300+</text>
    <text x="650" y="486" text-anchor="middle" class="sans" font-size="12" letter-spacing="2" fill="#9ca3af">DUPES AVALIADOS</text>
  </g>
  <circle cx="760" cy="450" r="3" fill="#d1d5db"/>
  <g>
    <text x="870" y="460" text-anchor="middle" class="title-reg" font-size="40" font-weight="300" fill="#b8912a">9.3</text>
    <text x="870" y="486" text-anchor="middle" class="sans" font-size="12" letter-spacing="2" fill="#9ca3af">SCORE MÁXIMO</text>
  </g>
</svg>
